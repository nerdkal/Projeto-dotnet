version: 0.2

phases:
  pre_build:
    commands:
      - echo Fazendo login no Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
  build:
    commands:
      - echo Compilando o projeto MeuSite 3.1...
      - dotnet publish MeuSite.csproj -c Release -o out/
      - echo Criando Dockerfile...
      - |
        cat <<EOF > Dockerfile
        FROM mcr.microsoft.com/dotnet/aspnet:3.1
        WORKDIR /app
        COPY out/ .
        EXPOSE 80
        ENTRYPOINT ["dotnet", "MeuSite.dll"]
        EOF
      - echo Construindo imagem Docker...
      - docker build -t $REPOSITORY_URI:latest .
  post_build:
    commands:
      - echo Enviando imagem para o ECR...
      - docker push $REPOSITORY_URI:latest      
      - printf '[{"name":"Projeto-Container","imageUri":"%s"}]' "$REPOSITORY_URI:latest" > imagedefinitions.json
artifacts:
  files: imagedefinitions.json
